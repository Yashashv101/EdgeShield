server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shieldgate
    username: postgres
    password: "Your Pass"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-this-in-production!!}
  expiration: 3600000

ratelimit:
  max-requests: ${RATE_LIMIT:100}
  window-seconds: 60

proxy:
  target-url: ${TARGET_URL:http://localhost:9090}

auth:
  login-url: ${LOGIN_URL:http://localhost:9090/login}
  register-url: ${REGISTER_URL:http://localhost:9090/register}  